<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>AG Plex — Home</title>

  <link rel="apple-touch-icon" href="../assets/favicon-180.png">
  <link rel="icon" type="image/png" href="../assets/favicon-180.png">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Bungee&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --aqua:   #1898a8;
      --white:  #ffffff;
      --shadow: 0 9px 28px rgba(0,0,0,.5);

      --red:    #c83228;
      --orange: #d4682a;
      --yellow: #d4a820;
      --green:  #28985a;
      --indigo: #3848b0;
      --cyan:   #1898a8;

      --border: rgba(255,255,255,.10);
      --banner-offset: 0px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Barlow', system-ui, sans-serif;
      color: var(--white);
      min-height: 100vh;
      padding-top: var(--banner-offset);
      background:
        linear-gradient(180deg, rgba(0,0,0,.60), rgba(0,0,0,.60)),
        url("../assets/bgphoto.png") center/cover no-repeat fixed;
    }

    /* ── GRAIN over everything ── */
    #vhs-grain {
      position: fixed;
      inset: 0;
      z-index: 9990;
      pointer-events: none;
      opacity: 0.06;
      mix-blend-mode: screen;
    }

    /* horizontal wear lines */
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 9989;
      pointer-events: none;
      background: repeating-linear-gradient(
        180deg,
        transparent            0px,
        transparent            60px,
        rgba(255,255,255,.010) 60px,
        rgba(255,255,255,.010) 61px,
        transparent            61px,
        transparent            130px,
        rgba(255,255,255,.007) 130px,
        rgba(255,255,255,.007) 131px,
        transparent            131px,
        transparent            220px
      );
    }

    /* ── TOPBAR ── */
    .topbar {
      position: sticky;
      top: var(--banner-offset);
      z-index: 100;
      padding: calc(12px + env(safe-area-inset-top)) 14px 10px;
      display: flex;
      justify-content: center;
      background: linear-gradient(180deg, rgba(0,0,0,.5), rgba(0,0,0,0));
      backdrop-filter: blur(6px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 18px;
      background: #ffffff;
      border: 2px solid #dce4f0;
      border-right-color: #8090b0;
      border-bottom-color: #8090b0;
      border-radius: 4px;
      text-decoration: none;
      color: #0e1420;
      font-family: 'Bungee', cursive;
      font-size: 16px;
      letter-spacing: 2px;
      box-shadow: 0 4px 18px rgba(0,0,0,.7);
    }

    .brand img {
      width: 30px;
      height: 30px;
      border-radius: 3px;
      opacity: .92;
    }

    /* ── LAYOUT ── */
    .wrap {
      max-width: 860px;
      margin: 0 auto;
      padding: 12px 14px 42px;
    }

    /* ── PANELS — flat VHS label blocks ── */
    .panel {
      margin-top: 12px;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 4px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    /* rainbow top stripe on first panel */
    .panel-rainbow {
      display: flex;
      height: 6px;
    }
    .panel-rainbow span { flex: 1; }

    .panel-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 16px;
      border-bottom: 1px solid rgba(255,255,255,.08);
      background: rgba(0,0,0,.55);
    }

    .panel-title {
      font-family: 'Bungee', cursive;
      font-size: 18px;
      letter-spacing: .04em;
      color: #ffffff;
      line-height: 1;
    }

    .panel-body {
      background: rgba(0,0,0,.18);
      backdrop-filter: blur(4px);
      padding: 14px 16px 16px;
    }

    /* ── QUICK LINKS LIST ── */
    .links {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .links li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 12px;
      border: 1px solid rgba(255,255,255,.07);
      background: rgba(0,0,0,.12);
      transition: background .1s ease;
    }

    .links li:hover {
      background: rgba(255,255,255,.10);
    }

    /* color tab on left — cycles through VHS colors */
    .links li:nth-child(1) { border-left: 3px solid var(--red); }
    .links li:nth-child(2) { border-left: 3px solid var(--orange); }
    .links li:nth-child(3) { border-left: 3px solid var(--yellow); }
    .links li:nth-child(4) { border-left: 3px solid var(--green); }
    .links li:nth-child(5) { border-left: 3px solid var(--indigo); }
    .links li:nth-child(6) { border-left: 3px solid var(--cyan); }
    .links li:nth-child(7) { border-left: 3px solid var(--red); }

    .link-emoji {
      font-size: 20px;
      flex: 0 0 auto;
      line-height: 1;
    }

    a.biglink {
      font-family: 'Bungee', cursive;
      font-size: clamp(15px, 2.2vw, 20px);
      letter-spacing: .03em;
      color: #ffffff;
      text-decoration: none;
      flex: 1;
      line-height: 1.2;
    }

    a.biglink:hover {
      color: #a8d0f8;
      text-decoration: underline;
      text-underline-offset: 4px;
    }

    /* ── STATUS EMBED ── */
    .status-wrap {
      margin-top: 4px;
      border: 1px solid rgba(255,255,255,.08);
      overflow: hidden;
      background: rgba(0,0,0,.3);
    }

    .status-frame {
      width: 100%;
      aspect-ratio: 16 / 9;
      min-height: 320px;
      max-height: 640px;
      position: relative;
    }

    .status-frame iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      background: #000;
    }

    /* ── TAPE DIVIDER ── */
    .tape-divider {
      height: 2px;
      margin-top: 12px;
      background: repeating-linear-gradient(
        90deg,
        rgba(255,255,255,.08) 0px,
        rgba(255,255,255,.08) 3px,
        transparent           3px,
        transparent           6px
      );
    }

    @media (max-width: 520px) {
      body { padding-left: 0; padding-right: 0; }
      .wrap { padding: 8px 10px 36px; }
      .status-frame {
        aspect-ratio: 10 / 10;
        min-height: 420px;
        max-height: 760px;
      }
    }
  </style>
</head>
<body>
  <canvas id="vhs-grain"></canvas>

  <header class="topbar">
    <a href="https://agplexhub.com/home/" class="brand">
      <img src="../assets/favicon-180.png" alt="AG Plex Icon">
      AG PLEX
    </a>
  </header>

  <main class="wrap">

    <!-- QUICK LINKS -->
    <section class="panel">
      <div class="panel-rainbow">
        <span style="background:#c83228"></span>
        <span style="background:#d4682a"></span>
        <span style="background:#d4a820"></span>
        <span style="background:#28985a"></span>
        <span style="background:#3848b0"></span>
        <span style="background:#1898a8"></span>
      </div>
      <div class="panel-header">
        <span class="panel-title">📌 Quick Links</span>
      </div>
      <div class="panel-body">
        <ul class="links">
          <li><a class="biglink" href="https://agplexhub.com/request/">Make a Request for the Plex!</a><span class="link-emoji">✌️</span></li>
          <li><a class="biglink" href="https://agplexhub.com/tek/">Plex Support Bot</a><span class="link-emoji">🐵</span></li>
          <li><a class="biglink" href="https://agplexhub.com/join/">Join AG Plex</a><span class="link-emoji">🎟️</span></li>
          <li><a class="biglink" href="https://agplexhub.com/coming-soon/">Coming Soon</a><span class="link-emoji">🍿</span></li>
          <li><a class="biglink" href="https://plex-recs-rex.fly.dev/">Plex Recommendations</a><span class="link-emoji">🦖</span></li>
          <li><a class="biglink" href="https://agplexhub.com/gallery/">AG PLEXclusives Gallery</a><span class="link-emoji">⭐</span></li>
          <li><a class="biglink" href="https://agplexhub.com/FAQ/">FAQ</a><span class="link-emoji">❓</span></li>
        </ul>
        <div class="tape-divider"></div>
      </div>
    </section>

    <!-- SERVER STATUS -->
    <section class="panel">
      <div class="panel-header">
        <span class="panel-title">📡 Server Status</span>
      </div>
      <div class="panel-body" style="padding: 12px;">
        <div class="status-wrap">
          <div class="status-frame">
            <iframe
              src="https://earnest-rugelach-35fda3.netlify.app/"
              title="AG Plex Server Status"
              loading="lazy"
              scrolling="no">
            </iframe>
          </div>
        </div>
      </div>
    </section>

  </main>

  <!-- GLOBAL BANNER LOADER -->
  <script>
  (async () => {
    try {
      if (document.body.dataset.noBanner === "true") return;
      const cfgRes = await fetch("/assets/banner-config.json", { cache: "no-store" });
      if (!cfgRes.ok) return;
      const cfg = await cfgRes.json();
      if (!cfg.enabled) return;
      const bannerRes = await fetch(cfg.html_path || "/assets/banner.html", { cache: "no-store" });
      if (!bannerRes.ok) return;
      const html = await bannerRes.text();
      const mount = document.createElement("div");
      mount.innerHTML = html;
      document.body.insertBefore(mount, document.body.firstChild);
      function setOffset(){
        const el = document.querySelector(".global-banner");
        const h = el ? Math.ceil(el.getBoundingClientRect().height) : 0;
        document.documentElement.style.setProperty("--banner-offset", h + "px");
      }
      setOffset();
      window.addEventListener("resize", setOffset);
    } catch {}
  })();
  </script>

  <!-- GRAIN -->
  <script>
  (function(){
    const canvas = document.getElementById("vhs-grain");
    const ctx = canvas.getContext("2d");
    function resize(){ canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    resize();
    window.addEventListener("resize", resize);
    function draw(){
      const w=canvas.width, h=canvas.height, img=ctx.createImageData(w,h), d=img.data;
      for(let i=0;i<d.length;i+=4){
        const v=Math.random()*255|0;
        d[i]=d[i+1]=d[i+2]=v; d[i+3]=16;
      }
      ctx.putImageData(img,0,0);
      requestAnimationFrame(draw);
    }
    draw();
  })();
  </script>

</body>
</html>
