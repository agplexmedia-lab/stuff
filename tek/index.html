<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Tek Tech Support Bot</title>

  <link rel="apple-touch-icon" href="../assets/favicon-180.png">
  <link rel="icon" type="image/png" href="../assets/favicon-180.png">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Bungee&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:        #12161f;
      --bg-2:      #0e1119;
      --card:      #181d28;
      --text:      #dce4f0;
      --muted:     #7080a0;

      --blue:      #2d6bbf;
      --blue-lt:   #4d8fdf;

      --red:       #c83228;
      --orange:    #d4682a;
      --yellow:    #d4a820;
      --green:     #28985a;
      --indigo:    #3848b0;
      --cyan:      #1898a8;

      --border:    rgba(255,255,255,.07);
      --shadow:    0 8px 28px rgba(0,0,0,.6);
      --banner-offset: 0px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Barlow', system-ui, sans-serif;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      padding-top: var(--banner-offset);
      padding-left: 12px;
      padding-right: 12px;
    }

    /* ── GRAIN ── */
    #vhs-grain {
      position: fixed;
      inset: 0;
      z-index: 9990;
      pointer-events: none;
      opacity: 0.07;
      mix-blend-mode: screen;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 9989;
      pointer-events: none;
      background: repeating-linear-gradient(
        180deg,
        transparent              0px,
        transparent              60px,
        rgba(255,255,255,.012)   60px,
        rgba(255,255,255,.012)   61px,
        transparent              61px,
        transparent              120px,
        rgba(255,255,255,.008)   120px,
        rgba(255,255,255,.008)   121px,
        transparent              121px,
        transparent              200px
      );
    }

    /* ── HEADER ── */
    .site-header {
      flex: 0 0 auto;
      position: sticky;
      top: var(--banner-offset);
      z-index: 100;
      padding: calc(10px + env(safe-area-inset-top)) 0 10px;
      display: flex;
      justify-content: center;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 18px;
      background: #ffffff;
      border: 2px solid #dce4f0;
      border-right-color: #8090b0;
      border-bottom-color: #8090b0;
      border-radius: 4px;
      text-decoration: none;
      color: #0e1420;
      font-family: 'Bungee', cursive;
      font-size: 16px;
      letter-spacing: 2px;
      box-shadow: 0 4px 18px rgba(0,0,0,.7);
    }

    .brand img {
      width: 28px;
      height: 28px;
      border-radius: 3px;
      opacity: .92;
    }

    /* ── MAIN ── */
    main {
      flex: 1 1 auto;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    .wrap {
      max-width: 980px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      flex: 1 1 auto;
      min-height: 0;
    }

    /* ── HERO (compact) ── */
    .hero {
      flex: 0 0 auto;
      position: relative;
      overflow: hidden;
      background: #0d1220;
      border: 1px solid rgba(255,255,255,.09);
      border-radius: 4px;
      box-shadow: var(--shadow);
      margin-bottom: 8px;
      margin-top: 4px;
    }

    .hero-rainbow {
      display: flex;
      height: 7px;
      width: 100%;
    }
    .hero-rainbow span { flex: 1; }

    .hero-body {
      padding: 10px 14px 10px;
      position: relative;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .hero-body::after {
      content: "";
      position: absolute;
      top: 0; right: 0;
      width: 40%;
      height: 100%;
      pointer-events: none;
      background: repeating-linear-gradient(
        -52deg,
        transparent          0px,
        transparent          28px,
        rgba(45,107,191,.07) 28px,
        rgba(45,107,191,.07) 34px,
        transparent          34px,
        transparent          62px
      );
    }

    .hero-brand-img {
      width: 36px;
      height: 36px;
      border-radius: 4px;
      opacity: .92;
      flex: 0 0 auto;
      position: relative;
      z-index: 1;
    }

    .hero-text {
      position: relative;
      z-index: 1;
    }

    .eyebrow {
      font-family: 'Barlow', sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 2.5px;
      color: var(--cyan);
      text-transform: uppercase;
      margin-bottom: 2px;
    }

    .hero h1 {
      font-family: 'Bungee', cursive;
      font-size: 22px;
      line-height: 1.04;
      color: #ffffff;
      text-shadow: 1px 1px 0 rgba(0,0,0,.8);
    }

    .hero-sub {
      font-family: 'Barlow', sans-serif;
      font-size: 13px;
      line-height: 1.5;
      color: #7080a0;
      margin-top: 2px;
    }

    .hero-sub a {
      color: var(--blue-lt);
      text-decoration: none;
      border-bottom: 1px solid rgba(77,143,223,.3);
    }

    .hero-rainbow-bottom {
      display: flex;
      height: 4px;
      width: 100%;
    }
    .hero-rainbow-bottom span { flex: 1; }

    /* ── CHAT BLOCK ── */
    .block {
      flex: 1 1 auto;
      min-height: 0;
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      box-shadow: 0 4px 16px rgba(0,0,0,.45);
      display: flex;
      flex-direction: column;
      margin-bottom: 8px;
    }

    .block-header {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 14px;
      background: var(--cyan);
      border-bottom: 1px solid rgba(255,255,255,.06);
    }

    /* cyan header — distinct from blue/yellow/green/indigo used elsewhere */
    .block-header.teal { background: #0e7080; }

    .block-label {
      font-family: 'Bungee', cursive;
      font-size: 15px;
      letter-spacing: .5px;
      text-transform: uppercase;
      color: #ffffff;
      line-height: 1;
    }

    .block-label-sub {
      font-family: 'Barlow', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      color: rgba(255,255,255,.5);
      text-transform: uppercase;
      margin-left: auto;
    }

    /* ── IFRAME ── */
    .iframe-wrap {
      flex: 1 1 auto;
      min-height: 0;
      background: #000;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }

    /* ── FOOTER OVERRIDES ── */
    #footerMount { flex: 0 0 auto; }

    #footerMount .site-footer,
    #footerMount footer,
    #footerMount [class*="footer"] {
      background: #0e1119 !important;
      border-top: 1px solid rgba(255,255,255,.08) !important;
      color: #7080a0 !important;
      text-align: center !important;
      padding: 12px 18px 20px !important;
    }

    #footerMount a { color: #4d8fdf !important; text-decoration: none !important; }
    #footerMount a:hover { color: #7aacdc !important; text-decoration: underline !important; }

    #footerMount * {
      color: inherit;
      font-family: 'Barlow', sans-serif !important;
      font-size: 13px !important;
      letter-spacing: .3px !important;
      text-align: center !important;
    }

    #footerMount nav, #footerMount ul, #footerMount ol {
      display: flex !important;
      flex-wrap: wrap !important;
      justify-content: center !important;
      gap: 6px 14px !important;
      list-style: none !important;
      padding: 0 !important;
      margin: 0 auto !important;
    }

    @media (min-width: 600px) {
      body { padding-left: 18px; padding-right: 18px; }
      .hero h1 { font-size: 26px; }
    }
  </style>
</head>
<body>
  <canvas id="vhs-grain"></canvas>

  <header class="site-header">
    <a href="https://agplexhub.com/home/" class="brand">
      <img src="../assets/favicon-180.png" alt="AG Plex Home">
      AG PLEX
    </a>
  </header>

  <main>
    <div class="wrap">

      <!-- COMPACT HERO -->
      <div class="hero">
        <div class="hero-rainbow">
          <span style="background:#c83228"></span>
          <span style="background:#d4682a"></span>
          <span style="background:#d4a820"></span>
          <span style="background:#28985a"></span>
          <span style="background:#3848b0"></span>
          <span style="background:#1898a8"></span>
        </div>
        <div class="hero-body">
          <img class="hero-brand-img" src="../assets/favicon-180.png" alt="AG Plex logo">
          <div class="hero-text">
            <div class="eyebrow">AG Plex</div>
            <h1>Tek — Tech Support Bot</h1>
            <div class="hero-sub">
              Tek is an AI with Plex knowledge. Ask him anything! Or <a href="https://docs.google.com/forms/d/e/1FAIpQLScUSTxNo0ZRSBOt0GjUksD_AG00lTeC4SQ_yseqZfjAF4grAQ/viewform" rel="noopener">Report a Problem</a>.
            </div>
          </div>
        </div>
        <div class="hero-rainbow-bottom">
          <span style="background:#c83228"></span>
          <span style="background:#d4682a"></span>
          <span style="background:#d4a820"></span>
          <span style="background:#28985a"></span>
          <span style="background:#3848b0"></span>
          <span style="background:#1898a8"></span>
        </div>
      </div>

      <!-- CHAT BLOCK -->
      <div class="block">
        <div class="block-header teal">
          <span class="block-label">Tek Support Chat</span>
          <span class="block-label-sub">AI Assistant</span>
        </div>
        <div class="iframe-wrap">
          <iframe
            src="https://tek-support.fly.dev/"
            title="Tek Support"
            loading="eager"
            referrerpolicy="no-referrer-when-downgrade"
            allow="clipboard-read; clipboard-write"
            allowfullscreen
          ></iframe>
        </div>
      </div>

    </div>
  </main>

  <div id="footerMount"></div>

  <!-- GLOBAL BANNER LOADER -->
  <script>
  (async () => {
    try {
      if (document.body.dataset.noBanner === "true") return;
      const cfgRes = await fetch("/assets/banner-config.json", { cache: "no-store" });
      if (!cfgRes.ok) return;
      const cfg = await cfgRes.json();
      if (!cfg.enabled) return;
      const bannerRes = await fetch(cfg.html_path || "/assets/banner.html", { cache: "no-store" });
      if (!bannerRes.ok) return;
      const html = await bannerRes.text();
      const mount = document.createElement("div");
      mount.innerHTML = html;
      document.body.insertBefore(mount, document.body.firstChild);
      function setOffset(){
        const el = document.querySelector(".global-banner");
        const h = el ? Math.ceil(el.getBoundingClientRect().height) : 0;
        document.documentElement.style.setProperty("--banner-offset", h + "px");
      }
      setOffset();
      window.addEventListener("resize", setOffset);
    } catch {}
  })();
  </script>

  <!-- GLOBAL FOOTER LOADER -->
  <script>
  (async () => {
    try {
      if (document.body.dataset.noFooter === "true") return;
      const cfgRes = await fetch("/assets/footer-config.json", { cache: "no-store" });
      if (!cfgRes.ok) return;
      const cfg = await cfgRes.json();
      if (!cfg.enabled) return;
      const footerRes = await fetch(cfg.html_path || "/assets/footer.html", { cache: "no-store" });
      if (!footerRes.ok) return;
      const html = await footerRes.text();
      const mount = document.getElementById("footerMount") || document.body;
      const wrap = document.createElement("div");
      wrap.innerHTML = html;
      if (mount === document.body) document.body.appendChild(wrap);
      else mount.replaceChildren(wrap);
    } catch {}
  })();
  </script>

  <!-- GRAIN -->
  <script>
  (function(){
    const canvas = document.getElementById("vhs-grain");
    const ctx = canvas.getContext("2d");
    function resize(){ canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    resize();
    window.addEventListener("resize", resize);
    function draw(){
      const w=canvas.width, h=canvas.height, img=ctx.createImageData(w,h), d=img.data;
      for(let i=0;i<d.length;i+=4){
        const v=Math.random()*255|0;
        d[i]=d[i+1]=d[i+2]=v; d[i+3]=18;
      }
      ctx.putImageData(img,0,0);
      requestAnimationFrame(draw);
    }
    draw();
  })();
  </script>

</body>
</html>
