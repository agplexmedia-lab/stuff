<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>AG Plex — Coming Soon</title>

  <link rel="apple-touch-icon" href="../assets/favicon-180.png">
  <link rel="icon" type="image/png" href="../assets/favicon-180.png">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Bungee&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:        #12161f;
      --bg-2:      #0e1119;
      --card:      #181d28;
      --text:      #dce4f0;
      --muted:     #7080a0;

      --blue:      #2d6bbf;
      --blue-lt:   #4d8fdf;

      --red:       #c83228;
      --orange:    #d4682a;
      --yellow:    #d4a820;
      --green:     #28985a;
      --indigo:    #3848b0;
      --cyan:      #1898a8;

      --sticker:        #d4a820;
      --sticker-dark:   #8a6010;

      --border:    rgba(255,255,255,.07);
      --shadow:    0 8px 28px rgba(0,0,0,.6);
      --maxw:      900px;
      --banner-offset: 0px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Barlow', system-ui, sans-serif;
      min-height: 100vh;
    }

    body {
      padding-top: var(--banner-offset);
      padding-left: 12px;
      padding-right: 12px;
      padding-bottom: 0;
    }

    /* ── GRAIN ── */
    #vhs-grain {
      position: fixed;
      inset: 0;
      z-index: 9990;
      pointer-events: none;
      opacity: 0.07;
      mix-blend-mode: screen;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 9989;
      pointer-events: none;
      background: repeating-linear-gradient(
        180deg,
        transparent              0px,
        transparent              60px,
        rgba(255,255,255,.012)   60px,
        rgba(255,255,255,.012)   61px,
        transparent              61px,
        transparent              120px,
        rgba(255,255,255,.008)   120px,
        rgba(255,255,255,.008)   121px,
        transparent              121px,
        transparent              200px
      );
    }

    /* ── LAYOUT ── */
    .wrap {
      width: 100%;
      max-width: var(--maxw);
      margin: 0 auto;
      padding-bottom: 30px;
    }

    /* ── HEADER ── */
    .site-header {
      position: sticky;
      top: var(--banner-offset);
      z-index: 100;
      padding: calc(10px + env(safe-area-inset-top)) 0 10px;
      display: flex;
      justify-content: center;
      margin-bottom: 12px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 18px;
      background: #ffffff;
      border: 2px solid #dce4f0;
      border-right-color: #8090b0;
      border-bottom-color: #8090b0;
      border-radius: 4px;
      text-decoration: none;
      color: #0e1420;
      font-family: 'Bungee', cursive;
      font-size: 16px;
      letter-spacing: 2px;
      box-shadow: 0 4px 18px rgba(0,0,0,.7);
    }

    .brand img {
      width: 28px;
      height: 28px;
      border-radius: 3px;
      opacity: .92;
    }

    /* ── HERO ── */
    .hero {
      position: relative;
      overflow: hidden;
      background: #0d1220;
      border: 1px solid rgba(255,255,255,.09);
      border-radius: 4px;
      box-shadow: var(--shadow);
      margin-bottom: 10px;
    }

    .hero-rainbow {
      display: flex;
      height: 10px;
      width: 100%;
    }
    .hero-rainbow span { flex: 1; }

    .hero-body {
      padding: 20px 20px 16px;
      position: relative;
    }

    .hero-body::after {
      content: "";
      position: absolute;
      top: 0; right: 0;
      width: 50%;
      height: 100%;
      pointer-events: none;
      background: repeating-linear-gradient(
        -52deg,
        transparent          0px,
        transparent          28px,
        rgba(45,107,191,.07) 28px,
        rgba(45,107,191,.07) 34px,
        transparent          34px,
        transparent          62px
      );
    }

    .hero-brand {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .hero-brand img {
      width: 40px;
      height: 40px;
      border-radius: 4px;
      opacity: .92;
    }

    .eyebrow {
      font-family: 'Barlow', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2.5px;
      color: var(--cyan);
      text-transform: uppercase;
    }

    .hero h1 {
      position: relative;
      z-index: 1;
      font-family: 'Bungee', cursive;
      font-size: 34px;
      line-height: 1.04;
      color: #ffffff;
      margin-bottom: 10px;
      text-shadow: 1px 1px 0 rgba(0,0,0,.8);
    }

    .hero-sub {
      position: relative;
      z-index: 1;
      font-family: 'Barlow', sans-serif;
      font-size: 14px;
      line-height: 1.7;
      color: #8898b8;
    }

    .hero-sub strong { color: #c8d8e8; font-weight: 700; }

    .hero-rainbow-bottom {
      display: flex;
      height: 7px;
      width: 100%;
    }
    .hero-rainbow-bottom span { flex: 1; }

    /* ── MAIN BLOCK ── */
    .block {
      margin-top: 10px;
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      box-shadow: 0 4px 16px rgba(0,0,0,.45);
    }

    .block-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 9px 14px;
      border-bottom: 1px solid rgba(255,255,255,.06);
    }

    .block-header.yellow { background: #6a4c00; border-bottom-color: rgba(255,255,255,.08); }
    .block-header.blue   { background: var(--blue); }

    .block-label {
      font-family: 'Bungee', cursive;
      font-size: 15px;
      letter-spacing: .5px;
      text-transform: uppercase;
      color: #ffffff;
      line-height: 1;
    }

    .block-label-sub {
      font-family: 'Barlow', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      color: rgba(255,255,255,.5);
      text-transform: uppercase;
    }

    .block-body {
      background: var(--card);
      padding: 16px;
    }

    /* ── FILTER ROW ── */
    .filter-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .status-text {
      font-family: 'Barlow', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: .5px;
      text-transform: uppercase;
    }

    input.filter-input {
      padding: 9px 12px;
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 0;
      font-size: 14px;
      font-family: 'Barlow', sans-serif;
      background: #0e1420;
      color: var(--text);
      outline: none;
      width: 220px;
      max-width: 100%;
    }

    input.filter-input::placeholder { color: #3a4a60; }
    input.filter-input:focus {
      border-color: rgba(45,107,191,.6);
      box-shadow: 0 0 0 3px rgba(45,107,191,.15);
    }

    /* ── GRID ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 10px;
    }

    .card {
      display: block;
      text-decoration: none;
      color: inherit;
      background: #111825;
      border: 1px solid rgba(255,255,255,.07);
      border-radius: 0;
      overflow: hidden;
      transition: filter .1s ease;
    }

    .card:hover { filter: brightness(1.1); }

    .poster {
      width: 100%;
      aspect-ratio: 2 / 3;
      object-fit: cover;
      display: block;
      background: #0d1825;
      filter: saturate(.85) contrast(1.05);
    }

    .card-body {
      padding: 8px 9px 10px;
    }

    .card-title {
      font-family: 'Barlow', sans-serif;
      font-size: 13px;
      font-weight: 700;
      line-height: 1.35;
      color: #c8d8e8;
      margin-bottom: 7px;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
      overflow: hidden;
    }

    .card-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
    }

    .card-date {
      font-family: 'Barlow', sans-serif;
      font-size: 13px;
      font-weight: 700;
      line-height: 1;
      color: var(--blue-lt);
      letter-spacing: .3px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 3px 7px 4px;
      border-radius: 2px;
      font-family: 'Barlow', sans-serif;
      font-size: 11px;
      font-weight: 700;
      line-height: 1;
      letter-spacing: .5px;
      text-transform: uppercase;
      border: 1px solid #c8b858;
      color: #3a2a08;
      background: #f0e090;
      box-shadow: 1px 1px 0 rgba(80,60,10,.3);
      white-space: nowrap;
      transform: rotate(-2deg);
    }

    .empty {
      display: none;
      text-align: center;
      padding: 30px 10px;
      font-family: 'Barlow', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: var(--muted);
    }

    /* ── TAPE DIVIDER ── */
    .tape-divider {
      height: 2px;
      margin-top: 14px;
      background: repeating-linear-gradient(
        90deg,
        rgba(255,255,255,.06) 0px,
        rgba(255,255,255,.06) 3px,
        transparent           3px,
        transparent           6px
      );
    }

    /* ── UNIVERSAL FOOTER OVERRIDES ── */
    #footerMount { margin-top: 24px; }

    #footerMount .site-footer,
    #footerMount footer,
    #footerMount [class*="footer"] {
      background: #0e1119 !important;
      border-top: 1px solid rgba(255,255,255,.08) !important;
      color: #7080a0 !important;
      text-align: center !important;
      padding: 20px 18px 32px !important;
    }

    #footerMount a { color: #4d8fdf !important; text-decoration: none !important; }
    #footerMount a:hover { color: #7aacdc !important; text-decoration: underline !important; }

    #footerMount * {
      color: inherit;
      font-family: 'Barlow', sans-serif !important;
      font-size: 14px !important;
      letter-spacing: .3px !important;
      text-align: center !important;
    }

    #footerMount nav, #footerMount ul, #footerMount ol {
      display: flex !important;
      flex-wrap: wrap !important;
      justify-content: center !important;
      gap: 6px 14px !important;
      list-style: none !important;
      padding: 0 !important;
      margin: 0 auto !important;
    }

    @media (min-width: 600px) {
      body { padding-left: 18px; padding-right: 18px; }
      .hero h1 { font-size: 42px; }
      .grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
      .filter-row { flex-wrap: nowrap; }
    }
  </style>
</head>
<body>
  <canvas id="vhs-grain"></canvas>

  <header class="site-header">
    <a href="https://agplexhub.com/home/" class="brand">
      <img src="../assets/favicon-180.png" alt="AG Plex Home">
      AG PLEX
    </a>
  </header>

  <div class="wrap">

    <!-- HERO -->
    <div class="hero">
      <div class="hero-rainbow">
        <span style="background:#c83228"></span>
        <span style="background:#d4682a"></span>
        <span style="background:#d4a820"></span>
        <span style="background:#28985a"></span>
        <span style="background:#3848b0"></span>
        <span style="background:#1898a8"></span>
      </div>
      <div class="hero-body">
        <div class="hero-brand">
          <img src="../assets/favicon-180.png" alt="AG Plex logo">
          <div class="eyebrow">AG Plex</div>
        </div>
        <h1>Coming Soon</h1>
        <p class="hero-sub">
          These titles are already queued in AG Plex. The date shown is when they're expected to appear.<br>
          <strong>??</strong> with an <strong>Est.</strong> tag means the date is unknown.
        </p>
      </div>
      <div class="hero-rainbow-bottom">
        <span style="background:#c83228"></span>
        <span style="background:#d4682a"></span>
        <span style="background:#d4a820"></span>
        <span style="background:#28985a"></span>
        <span style="background:#3848b0"></span>
        <span style="background:#1898a8"></span>
      </div>
    </div>

    <!-- GRID BLOCK -->
    <div class="block">
      <div class="block-header yellow">
        <span class="block-label">Coming Soon to AG Plex</span>
        <span class="block-label-sub" id="statusText">Loading…</span>
      </div>
      <div class="block-body">
        <div class="filter-row">
          <span class="status-text" id="statusSubtext"></span>
          <input class="filter-input" id="filterInput" placeholder="Filter by title…" />
        </div>
        <div class="grid" id="grid"></div>
        <div class="empty" id="emptyState">Nothing queued right now.</div>
        <div class="tape-divider"></div>
      </div>
    </div>

  </div>

  <div id="footerMount"></div>

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <!-- GLOBAL BANNER LOADER -->
  <script>
  (async () => {
    try {
      if (document.body.dataset.noBanner === "true") return;
      const cfgRes = await fetch("/assets/banner-config.json", { cache: "no-store" });
      if (!cfgRes.ok) return;
      const cfg = await cfgRes.json();
      if (!cfg.enabled) return;
      const bannerRes = await fetch(cfg.html_path || "/assets/banner.html", { cache: "no-store" });
      if (!bannerRes.ok) return;
      const html = await bannerRes.text();
      const mount = document.createElement("div");
      mount.innerHTML = html;
      document.body.insertBefore(mount, document.body.firstChild);
      function setOffset(){
        const el = document.querySelector(".global-banner");
        const h = el ? Math.ceil(el.getBoundingClientRect().height) : 0;
        document.documentElement.style.setProperty("--banner-offset", h + "px");
      }
      setOffset();
      window.addEventListener("resize", setOffset);
    } catch {}
  })();
  </script>

  <!-- GLOBAL FOOTER LOADER -->
  <script>
  (async () => {
    try {
      if (document.body.dataset.noFooter === "true") return;
      const cfgRes = await fetch("/assets/footer-config.json", { cache: "no-store" });
      if (!cfgRes.ok) return;
      const cfg = await cfgRes.json();
      if (!cfg.enabled) return;
      const footerRes = await fetch(cfg.html_path || "/assets/footer.html", { cache: "no-store" });
      if (!footerRes.ok) return;
      const html = await footerRes.text();
      const mount = document.getElementById("footerMount") || document.body;
      const wrap = document.createElement("div");
      wrap.innerHTML = html;
      if (mount === document.body) document.body.appendChild(wrap);
      else mount.replaceChildren(wrap);
    } catch {}
  })();
  </script>

  <!-- GRAIN -->
  <script>
  (function(){
    const canvas = document.getElementById("vhs-grain");
    const ctx = canvas.getContext("2d");
    function resize(){ canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    resize();
    window.addEventListener("resize", resize);
    function draw(){
      const w=canvas.width, h=canvas.height, img=ctx.createImageData(w,h), d=img.data;
      for(let i=0;i<d.length;i+=4){
        const v=Math.random()*255|0;
        d[i]=d[i+1]=d[i+2]=v; d[i+3]=18;
      }
      ctx.putImageData(img,0,0);
      requestAnimationFrame(draw);
    }
    draw();
  })();
  </script>

  <!-- APP LOGIC -->
  <script>
    const SHEET_CSV_URL =
      "https://docs.google.com/spreadsheets/d/e/2PACX-1vTtK9WGWZSlSJi58mOOBA01RBJ3OKeXeY9VyT4nnWFAKNL8C6SeoD8nz_srBPHupiqFr3_0Na53Y4Za/pub?gid=1263928559&single=true&output=csv";

    const TMDB_API_KEY = "5bbfc2b05c0d49eea2032b35324ebc81";

    const gridEl        = document.getElementById("grid");
    const statusText    = document.getElementById("statusText");
    const statusSubtext = document.getElementById("statusSubtext");
    const filterInput   = document.getElementById("filterInput");
    const emptyState    = document.getElementById("emptyState");

    const cards = [];
    const norm = v => (v ?? "").toString().trim();

    function lcRow(row) {
      const out = {};
      for (const k in row) out[k.toLowerCase()] = row[k];
      out.title          = norm(out.title);
      out.year           = norm(out.year);
      out.tmdb_id        = norm(out.tmdb_id);
      out.bucket         = norm(out.bucket);
      out.nextmilestone  = norm(out.nextmilestone);
      out.milestonesource= norm(out.milestonesource);
      return out;
    }

    function parseISODate(s) {
      if (!s) return null;
      const m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(s);
      if (!m) return null;
      return new Date(Number(m[1]), Number(m[2]) - 1, Number(m[3]));
    }

    async function fetchCSV(url) {
      const res = await fetch(url);
      if (!res.ok) throw new Error("Failed to load sheet CSV");
      const text = await res.text();
      const parsed = Papa.parse(text, { header: true, skipEmptyLines: true });
      return parsed.data.map(lcRow);
    }

    async function tmdbDetails(movieId) {
      return await fetch(`https://api.themoviedb.org/3/movie/${movieId}?api_key=${TMDB_API_KEY}`).then(r => r.json());
    }

    // HARDCODED SLUG TEST — There Will Be Blood
    // Letterboxd only appends year to slug when there's a title conflict.
    // "there-will-be-blood-2007" 404s; the real slug is just "there-will-be-blood".
    function buildLink(title, year) {
      return `https://letterboxd.com/film/there-will-be-blood/`;
    }

    function escapeHtml(s) {
      return (s ?? "").toString()
        .replaceAll("&","&amp;").replaceAll("<","&lt;")
        .replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#39;");
    }

    function addCard({ title, year, href, poster, dateText, est, sortKey }) {
      const a = document.createElement("a");
      a.href = href || "#";
      a.target = "_blank";
      a.rel = "noopener";
      a.className = "card";

      a.innerHTML = `
        <img class="poster" src="${poster}" alt="${escapeHtml(title)} poster">
        <div class="card-body">
          <div class="card-title">${escapeHtml(title)}${year ? ` (${escapeHtml(year)})` : ""}</div>
          <div class="card-meta">
            <span class="card-date">${escapeHtml(dateText)}</span>
            <span class="tag">${est ? "Est." : "On Plex"}</span>
          </div>
        </div>`;

      cards.push({ el: a, titleLower: (title||"").toLowerCase(), sortKey: Number.isFinite(sortKey) ? sortKey : Infinity });
    }

    function renderGridFromCards(list) {
      gridEl.replaceChildren(...list.map(c => c.el));
    }

    function applyFilter() {
      const q = filterInput.value.trim().toLowerCase();
      let shown = 0;
      for (const c of cards) {
        const match = !q || c.titleLower.includes(q);
        c.el.style.display = match ? "" : "none";
        if (match) shown++;
      }
      emptyState.style.display = shown ? "none" : "block";
      statusText.textContent    = `${shown} of ${cards.length} titles`;
      statusSubtext.textContent = `${shown} titles shown`;
    }

    filterInput.addEventListener("input", applyFilter);

    async function buildCardFromRow(r, today) {
      const title = r.title || "Untitled";
      const year  = r.year;
      const d     = parseISODate(r.nextmilestone);
      const hasFutureDate = !!(d && d > today);
      const sortKey  = hasFutureDate ? d.getTime() : Infinity;
      const dateText = hasFutureDate
        ? new Date(r.nextmilestone + "T00:00:00").toLocaleDateString("en-US")
        : "??";
      const estFromSheet = (r.milestonesource || "").toLowerCase().startsWith("estimate");
      const est = estFromSheet || !hasFutureDate;
      const tmdbId = r.tmdb_id;
      const href = buildLink(title, year);
      let poster = "https://placehold.co/342x513?text=No+Poster";
      if (tmdbId && /^\d+$/.test(tmdbId)) {
        try {
          const details = await tmdbDetails(tmdbId);
          if (details.poster_path) poster = `https://image.tmdb.org/t/p/w342${details.poster_path}`;
        } catch {}
      }
      addCard({ title, year, href, poster, dateText, est, sortKey });
    }

    async function main() {
      const rows = await fetchCSV(SHEET_CSV_URL);
      const comingSoon = rows.filter(r => r.bucket === "COMING_SOON");

      if (!comingSoon.length) {
        statusText.textContent = "0 titles";
        emptyState.style.display = "block";
        return;
      }

      const today = new Date(); today.setHours(0,0,0,0);
      statusText.textContent = `Loading ${comingSoon.length} titles…`;

      const CONCURRENCY = 6;
      let i = 0;
      async function worker() {
        while (i < comingSoon.length) {
          const r = comingSoon[i++];
          await buildCardFromRow(r, today);
          statusText.textContent = `Loading… (${cards.length}/${comingSoon.length})`;
        }
      }
      await Promise.all(Array.from({length: CONCURRENCY}, worker));

      cards.sort((a, b) => a.sortKey !== b.sortKey ? a.sortKey - b.sortKey : a.titleLower.localeCompare(b.titleLower));
      renderGridFromCards(cards);
      statusText.textContent = `${cards.length} titles`;
      applyFilter();
    }

    main().catch(err => {
      console.error(err);
      statusText.textContent = "Error loading list.";
      emptyState.style.display = "block";
    });
  </script>
</body>
</html>
